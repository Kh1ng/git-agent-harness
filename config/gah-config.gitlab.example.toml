[defaults]
artifact_root = "/home/you/.local/share/gah/artifacts"
worktree_base = "/home/you/.local/share/gah/worktrees"
llm_base_url = "http://localhost:4000"
llm_model_local = "your/local-model"
llm_model_cloud = "your/cloud-model"

[profiles.gitlab-repo]
display_name = "GitLab Repo"
repo_id = "gitlab-repo"
provider = "gitlab"
repo = "group/project"
local_path = "/path/to/local/clone"
artifact_root = "/home/you/.local/share/gah/artifacts/gitlab-repo"
default_target_branch = "main"
provider_api_base = "https://gitlab.com/api/v4"
provider_project_id = "12345"
oh_profile = "cloud-coder"
validation_commands = []
