[defaults]
artifact_root = "/home/you/.local/share/gah/artifacts"
worktree_base = "/home/you/.local/share/gah/worktrees"
llm_base_url = "http://localhost:4000"
llm_model_local = "your/local-model"
llm_model_cloud = "your/cloud-model"

[context]
enabled = true
soft_limit_tokens = 80000
hard_limit_tokens = 150000
compact_after_tool_calls = 20
fresh_context_on_review = true
fresh_context_on_fix = true
include_full_git_history = false
include_full_worker_transcript_in_review = false
recent_history_tokens = 20000
# Optional overrides use [context.profiles.<name>] and
# [context.backends.<backend>].

[defaults.routing]
default_backend = "openhands"
review_backend = "claude"
# Issue #123: new two-tier reviewer model (preferred over the deprecated
# strong_review_*/weak_review_* single-pair fields).
routine_reviewer = { backend = "claude", model = "sonnet" }
escalatory_reviewers = [
    { backend = "codex", model = "default" },
]
allow_review_fallback = true

# Optional deterministic implementation routing. The first rule whose
# mode/task_classes/difficulties/risks all match wins. A profile's non-empty
# task_routing_rules replaces the defaults list, so repositories can choose
# their own capacity policy without changing the binary.
[[defaults.routing.task_routing_rules]]
modes = ["improve", "fix"]
task_classes = ["documentation", "test", "mechanical"]
difficulties = ["easy"]
risks = ["low"]
candidates = [
  { backend = "opencode", model = "your-cheap-model", included_in_quota = true },
  { backend = "agy", model = "your-fallback-model", included_in_quota = true },
]

[profiles.my-repo]
display_name = "My Repo"
repo_id = "my-repo"
provider = "github"
repo = "owner/repo"
local_path = "/path/to/local/clone"
artifact_root = "/home/you/.local/share/gah/artifacts/my-repo"
default_target_branch = "main"
validation_commands = []

[profiles.my-repo.routing]
pm_backend = "claude"
improve_backend = "codex"
