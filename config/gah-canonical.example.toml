# TICKET-106: shared canonical routing policy, inherited by every repo's
# own gah-config.toml unless a repo explicitly overrides a field.
#
# Lives separately from any single repo's config. Default location:
# ~/.config/gah/canonical.toml (override with GAH_CANONICAL_CONFIG).
#
# Merge precedence: compiled defaults < this file < repo config < CLI override.
# Repo config wins per-field; unset fields inherit from here. Candidate
# lists (pm_candidates/improve_candidates/review_candidates/task_routing_rules) replace
# wholesale when a repo sets them, they never concatenate. Missing this
# file entirely is fully backward compatible -- repos behave exactly as
# they did before this file existed.

[routing]
# Issue #123: two-tier reviewer model.
#
# ROUTINE_REVIEWER -- the single STRONG first-line reviewer (replaces the
# deprecated strong_review_backend/strong_review_model pair).
routine_reviewer = { backend = "claude", model = "sonnet" }
# ESCALATORY_REVIEW -- an ORDERED LIST of advanced reviewers used when routine
# review escalates (replaces the deprecated single weak_review_backend/
# weak_review_model pair). Escalatory reviewers are escalate-and-continue
# (auto-merge eligible), distinct from the legacy weak tier that forced
# human_required.
escalatory_reviewers = [
    { backend = "codex", model = "default" },
]

[routing.review_required_capabilities]
claude = ["ponytail"]

# Deterministic implementation routing from trusted ticket metadata. Rules
# are evaluated top-to-bottom; non-empty match lists are ANDed, and a matching
# rule's candidate order is used until availability/concurrency requires a
# fallback. Replace these candidates to swap providers/models -- no code is
# model-specific. Rules apply only to improve/fix/experiment work.
[[routing.task_routing_rules]]
modes = ["improve", "fix"]
task_classes = ["documentation", "test", "mechanical"]
difficulties = ["easy"]
risks = ["low"]
candidates = [
  { backend = "opencode", model = "your-cheap-model", included_in_quota = true },
  { backend = "agy", model = "your-fallback-model", included_in_quota = true },
]
